general:
  kafka-topic: trader-updates

server:
  port: 33400

spring:
  kafka:
    consumer:
      group-id: my-app
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.mycompany.app.foundation"
        spring.json.value.default.type: com.mycompany.app.foundation.Transaction

      producer:
        key-serializer: org.apache.kafka.common.serializaztion.StringSerializer
        value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

        datasource:
          url: jdbc:h2:mem:testdb
          drive-class-name: irg.h2.Driver
          username: sa
          password:

        jpa:
          hibernate:
            ddl-auto: update
          show-sql: true
          database-platform: org.hibernate.dialect.H2Dialect

        h2:
          console:
            enabled: true
            path: /h2-console